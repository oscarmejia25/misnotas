<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas de Oscar</title>
    <style>
        :root { --bg: #f8fafc; --card: #fff; --text: #0f172a; --accent: #2563eb; --free: #16a34a; --free-bg: #dcfce7; --freemium: #d97706; --freemium-bg: #fef3c7; --premium: #dc2626; --premium-bg: #fee2e2; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg); color: var(--text); }
        h1 { text-align: center; margin: 0 0 20px; }
        #search { width: 100%; max-width: 500px; padding: 12px 16px; margin: 0 auto 25px; display: block; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; }
        #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        .section { margin-bottom: 35px; padding-bottom: 15px; border-bottom: 2px dashed #e2e8f0; }
        .section:last-child { border-bottom: none; }
        .section-title { font-size: 1.3rem; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
        .category { margin-bottom: 15px; }
        .category h2 { font-size: 0.95rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; margin-bottom: 8px; color: #475569; }
        .tool-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; padding: 0; list-style: none; }
        .tool-item { background: var(--card); padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid #e2e8f0; transition: 0.2s; font-weight: 500; }
        .tool-item:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-color: var(--accent); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 10; padding: 10px; box-sizing: border-box; }
        .modal-content { background: #fff; padding: 25px; border-radius: 12px; max-width: 480px; width: 100%; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .close { position: absolute; top: 12px; right: 16px; font-size: 24px; cursor: pointer; color: #64748b; }
        .close:hover { color: #0f172a; }
        .meta { display: flex; gap: 10px; align-items: center; margin: 8px 0 12px; flex-wrap: wrap; }
        .tag { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .type-IA { background: #dbeafe; color: #1e40af; }
        .type-Web { background: #f3e8ff; color: #7e22ce; }
        .type-Programa { background: #e0f2fe; color: #0369a1; }
        .type-Aplicacion { background: #dcfce7; color: #15803d; }
        .price-Free { background: var(--free-bg); color: var(--free); }
        .price-Freemium { background: var(--freemium-bg); color: var(--freemium); }
        .price-Premium { background: var(--premium-bg); color: var(--premium); }
        #modal-desc { line-height: 1.5; color: #334155; margin-bottom: 15px; }
        .btn-go { display: inline-block; padding: 10px 18px; background: var(--accent); color: #fff; text-decoration: none; border-radius: 6px; font-weight: 500; transition: 0.2s; }
        .btn-go:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <h1>📚 Herramientas de Oscar</h1>
    <input type="text" id="search" placeholder="Buscar por nombre, tipo, categoría o precio...">
    <div id="container"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title" style="margin: 0 0 5px;"></h2>
            <div class="meta">
                <span id="modal-type" class="tag"></span>
                <span id="modal-price" class="tag"></span>
            </div>
            <p id="modal-desc"></p>
            <a id="modal-link" href="#" target="_blank" class="btn-go">Ir al sitio</a>
        </div>
    </div>

    <script>
        // ➕ AGREGÁ O EDITÁ AQUÍ. Mantené la estructura exacta.
        const tools = [
            { name: "ChatGPT", type: "IA", category: "Redacción", href: "https://chatgpt.com", description: "LLM conversacional. Redacta, resume y resuelve dudas con alto contexto.", price: "Freemium" },
            { name: "GitHub Copilot", type: "IA", category: "Programación", href: "https://github.com/features/copilot", description: "Autocompletado inteligente en editores. Sugiere bloques y corrige errores.", price: "Freemium" },
            { name: "Khan Academy", type: "Web", category: "Educación", href: "https://es.khanacademy.org", description: "Plataforma gratuita con cursos de matemáticas, ciencias y programación.", price: "Free" },
            { name: "GeoGebra", type: "Web", category: "Educación", href: "https://www.geogebra.org", description: "Matemáticas interactivas: álgebra, geometría y cálculo en el navegador.", price: "Free" },
            { name: "VS Code", type: "Programa", category: "Desarrollo", href: "https://code.visualstudio.com", description: "Editor de código ligero y potente. Soporta extensiones, terminal y depuración nativa.", price: "Free" },
            { name: "OBS Studio", type: "Programa", category: "Multimedia", href: "https://obsproject.com", description: "Grabación y transmisión de video en vivo. Control de escenas, audio y overlays.", price: "Free" },
            { name: "Anki", type: "Aplicación", category: "Estudio", href: "https://apps.ankiweb.net", description: "Sistema de repetición espaciada. Tarjetas de memoria para retener información a largo plazo.", price: "Free" },
            { name: "Forest", type: "Aplicación", category: "Productividad", href: "https://www.forestapp.cc", description: "Temporizador gamificado. Plantás árboles virtuales mientras evitas distraerte con el móvil.", price: "Premium" },
            { name: "Muted.io", type: "Web", category: "Tutoriales", href: "https://muted.io", description: "Es una plataforma web gratuita que ofrece una colección de herramientas interactivas de teoría musical, referencias visuales de piano, escalas, acordes y tonalidades", price: "Free" }
            //{ name: "", type: "Aplicación/Programa/Web/IA", category: "", href: "https://", description: "", price: "Premium/Freemium/Free" }
        ];

        const container = document.getElementById('container');
        const searchInput = document.getElementById('search');
        const modal = document.getElementById('modal');
        const mTitle = document.getElementById('modal-title');
        const mType = document.getElementById('modal-type');
        const mPrice = document.getElementById('modal-price');
        const mDesc = document.getElementById('modal-desc');
        const mLink = document.getElementById('modal-link');

        const order = ["IA", "Web", "Programa", "Aplicación"];
        const icons = { "IA": "🤖", "Web": "🌐", "Programa": "💻", "Aplicación": "📱" };

        function render(filter = '') {
            container.innerHTML = '';
            const lower = filter.toLowerCase();
            const filtered = tools.filter(t => 
                t.name.toLowerCase().includes(lower) || 
                t.category.toLowerCase().includes(lower) || 
                t.type.toLowerCase().includes(lower) || 
                t.description.toLowerCase().includes(lower) || 
                t.price.toLowerCase().includes(lower)
            );

            order.forEach(type => {
                const typeTools = filtered.filter(t => t.type === type);
                if (!typeTools.length) return;

                const section = document.createElement('div');
                section.className = 'section';
                section.innerHTML = `<div class="section-title">${icons[type]} ${type}s</div>`;

                const grouped = {};
                typeTools.forEach(t => { if (!grouped[t.category]) grouped[t.category] = []; grouped[t.category].push(t); });
                
                Object.keys(grouped).sort().forEach(cat => {
                    const catDiv = document.createElement('div');
                    catDiv.className = 'category';
                    catDiv.innerHTML = `<h2>${cat}</h2><ul class="tool-list"></ul>`;
                    const ul = catDiv.querySelector('ul');
                    grouped[cat].forEach(t => {
                        const li = document.createElement('li');
                        li.className = 'tool-item';
                        li.textContent = t.name;
                        li.onclick = () => openModal(t);
                        ul.appendChild(li);
                    });
                    section.appendChild(catDiv);
                });
                container.appendChild(section);
            });
        }

        function openModal(t) {
            mTitle.textContent = t.name;
            mDesc.textContent = t.description;
            mLink.href = t.href;
            
            const safeType = t.type.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            mType.textContent = t.type;
            mType.className = `tag type-${safeType}`;
            mPrice.textContent = t.price;
            mPrice.className = `tag price-${t.price}`;
            
            modal.style.display = 'flex';
        }

        document.querySelector('.close').onclick = () => modal.style.display = 'none';
        window.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };
        searchInput.addEventListener('input', e => render(e.target.value));

        render();
    </script>
</body>
</html>
